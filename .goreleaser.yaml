version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: xquare
    binary: xquare
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: xquare
    name_template: "xquare_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - SKILL.md

brews:
  - name: xquare-cli
    repository:
      owner: team-xquare
      name: homebrew-xquare
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/team-xquare/xquare-cli"
    description: "PaaS CLI for DSM student teams"
    license: "MIT"
    install: |
      bin.install "xquare"
    test: |
      system "#{bin}/xquare version"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: team-xquare
    name: xquare-cli
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
